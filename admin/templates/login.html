<!DOCTYPE html>
<html lang="ru" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход — OBSC Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="h-full bg-gray-950 flex items-center justify-center">
  <div class="w-full max-w-sm px-4">
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-12 h-12 rounded-xl bg-indigo-600 mb-4">
        <svg class="w-6 h-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M5.25 5.653c0-.856.917-1.398 1.667-.986l11.54 6.348a1.125 1.125 0 010 1.971l-11.54 6.347a1.125 1.125 0 01-1.667-.985V5.653z" />
        </svg>
      </div>
      <h1 class="text-xl font-semibold text-white">OBSC Admin</h1>
      <p class="text-sm text-gray-500 mt-1">Панель управления скраппером</p>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
    {% for category, message in messages %}
    <div class="mb-4 px-4 py-3 rounded-lg text-sm bg-red-950 border border-red-800 text-red-300">
      {{ message }}
    </div>
    {% endfor %}
    {% endif %}
    {% endwith %}

    <form method="POST" class="space-y-4">
      <div>
        <label class="block text-xs font-medium text-gray-400 mb-1.5">Логин</label>
        <input type="text" name="username" required autofocus
               class="w-full px-3 py-2.5 rounded-lg bg-gray-900 border border-gray-700 text-white text-sm
                      placeholder-gray-600 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition">
      </div>
      <div>
        <label class="block text-xs font-medium text-gray-400 mb-1.5">Пароль</label>
        <input type="password" name="password" required
               class="w-full px-3 py-2.5 rounded-lg bg-gray-900 border border-gray-700 text-white text-sm
                      placeholder-gray-600 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition">
      </div>
      <button type="submit"
              class="w-full py-2.5 px-4 rounded-lg bg-indigo-600 hover:bg-indigo-500 text-white text-sm font-medium transition-colors">
        Войти
      </button>
    </form>
  </div>
</body>
</html>
