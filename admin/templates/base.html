<!DOCTYPE html>
<html lang="ru" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}OBSC Admin{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: '#6366f1'
          }
        }
      }
    }
  </script>
  <style>
    [x-cloak] { display: none !important; }
    .log-line { font-family: 'Courier New', monospace; font-size: 12px; line-height: 1.4; }
    .log-line.error { color: #f87171; }
    .log-line.warning { color: #fbbf24; }
    .log-line.info { color: #e5e7eb; }
    .log-line.debug { color: #6b7280; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #1f2937; }
    ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 3px; }
  </style>
</head>
<body class="h-full bg-gray-950 text-gray-100 antialiased">

{% if session.get('authenticated') %}
<div class="flex h-full">

  <!-- Sidebar -->
  <aside class="w-56 shrink-0 bg-gray-900 border-r border-gray-800 flex flex-col">
    <div class="px-5 py-4 border-b border-gray-800">
      <div class="flex items-center gap-2">
        <div class="w-6 h-6 rounded bg-indigo-600 flex items-center justify-center shrink-0">
          <svg class="w-3.5 h-3.5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M5.25 5.653c0-.856.917-1.398 1.667-.986l11.54 6.348a1.125 1.125 0 010 1.971l-11.54 6.347a1.125 1.125 0 01-1.667-.985V5.653z" />
          </svg>
        </div>
        <span class="text-sm font-semibold text-white">OBSC Scraper</span>
      </div>
    </div>

    <nav class="flex-1 px-3 py-4 space-y-0.5">
      <a href="{{ url_for('dashboard') }}"
         class="flex items-center gap-3 px-3 py-2 text-sm rounded-md transition-colors
                {% if request.path == '/dashboard' %}bg-gray-800 text-white font-medium{% else %}text-gray-400 hover:text-white hover:bg-gray-800{% endif %}">
        <svg class="w-4 h-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3 13.125C3 12.504 3.504 12 4.125 12h2.25c.621 0 1.125.504 1.125 1.125v6.75C7.5 20.496 6.996 21 6.375 21h-2.25A1.125 1.125 0 013 19.875v-6.75zM9.75 8.625c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125v11.25c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 01-1.125-1.125V8.625zM16.5 4.125c0-.621.504-1.125 1.125-1.125h2.25C20.496 3 21 3.504 21 4.125v15.75c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 01-1.125-1.125V4.125z" />
        </svg>
        Дашборд
      </a>

      <a href="{{ url_for('channels') }}"
         class="flex items-center gap-3 px-3 py-2 text-sm rounded-md transition-colors
                {% if request.path.startswith('/channels') %}bg-gray-800 text-white font-medium{% else %}text-gray-400 hover:text-white hover:bg-gray-800{% endif %}">
        <svg class="w-4 h-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 12h16.5m-16.5 3.75h16.5M3.75 19.5h16.5M5.625 4.5h12.75a1.875 1.875 0 010 3.75H5.625a1.875 1.875 0 010-3.75z" />
        </svg>
        Каналы
      </a>

      <a href="{{ url_for('logs') }}"
         class="flex items-center gap-3 px-3 py-2 text-sm rounded-md transition-colors
                {% if request.path == '/logs' %}bg-gray-800 text-white font-medium{% else %}text-gray-400 hover:text-white hover:bg-gray-800{% endif %}">
        <svg class="w-4 h-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z" />
        </svg>
        Логи
      </a>
    </nav>

    <div class="px-4 py-3 border-t border-gray-800">
      <a href="{{ url_for('logout') }}"
         class="flex items-center gap-2 text-xs text-gray-500 hover:text-gray-300 transition-colors">
        <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15M12 9l-3 3m0 0l3 3m-3-3h12.75" />
        </svg>
        Выйти
      </a>
    </div>
  </aside>

  <!-- Main area -->
  <div class="flex-1 min-w-0 overflow-auto flex flex-col">
    <!-- Flash messages -->
    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
    <div class="px-6 pt-4 space-y-2">
      {% for category, message in messages %}
      <div x-data="{ show: true }" x-show="show" x-cloak
           class="flex items-start justify-between gap-3 px-4 py-3 rounded-lg text-sm
                  {% if category == 'error' %}bg-red-950 border border-red-800 text-red-300
                  {% elif category == 'warning' %}bg-yellow-950 border border-yellow-800 text-yellow-300
                  {% elif category == 'success' %}bg-green-950 border border-green-800 text-green-300
                  {% else %}bg-blue-950 border border-blue-800 text-blue-300{% endif %}">
        <span>{{ message }}</span>
        <button @click="show = false" class="shrink-0 opacity-60 hover:opacity-100">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>
      </div>
      {% endfor %}
    </div>
    {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}
  </div>

</div>
{% endif %}

</body>
</html>
